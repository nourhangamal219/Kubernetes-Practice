apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  labels:
    app: myapp
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      tier: frontend
  template:
    metadata:
      name: myapp
      labels:
        tier: frontend
        env: dev
    spec:
      containers:
        - name: nginx-controller
          image: nginx